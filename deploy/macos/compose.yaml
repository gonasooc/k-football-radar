x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

services:
  k-football-radar:
    image: ${K_FOOTBALL_RADAR_IMAGE:?Build and select an immutable release first}
    pull_policy: never
    restart: unless-stopped
    init: true
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    stop_grace_period: 30s
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: 3000
      NEXT_PUBLIC_SITE_URL: ${K_FOOTBALL_RADAR_SITE_URL:?Set K_FOOTBALL_RADAR_SITE_URL}
      RADAR_DATA_BASE_URL: ${K_FOOTBALL_RADAR_DATA_BASE_URL:?Set K_FOOTBALL_RADAR_DATA_BASE_URL}
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - >-
          fetch('http://127.0.0.1:3000/api/health')
          .then((response) => { if (!response.ok) process.exit(1); })
          .catch(() => process.exit(1))
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    tmpfs:
      - /tmp:rw,nosuid,nodev,noexec,size=64m,mode=1777
      - /app/.next/cache:rw,nosuid,nodev,noexec,size=128m,uid=1001,gid=1001,mode=0700
    networks:
      - ingress
    logging: *default-logging

networks:
  ingress:
    name: ${K_FOOTBALL_RADAR_INGRESS_NETWORK:?Set K_FOOTBALL_RADAR_INGRESS_NETWORK}
    external: true
